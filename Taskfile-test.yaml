version: '3'

vars:
  TEST_PG_HOST: '{{.TEST_PG_HOST | default "localhost:5432"}}'
  TEST_PG_USER: '{{.TEST_PG_USER | default "postgres"}}'
  TEST_PG_PASSWORD: '{{.TEST_PG_PASSWORD | default "postgres"}}'
  TEST_PG_DB: '{{.TEST_PG_DB | default "qqm-test"}}'
  TEST_ROOT_DSN: 'postgres://{{.TEST_PG_USER}}:{{.TEST_PG_PASSWORD}}@{{.TEST_PG_HOST}}/postgres?sslmode=disable'
  TEST_PG_DSN: 'postgres://{{.TEST_PG_USER}}:{{.TEST_PG_PASSWORD}}@{{.TEST_PG_HOST}}/{{.TEST_PG_DB}}?sslmode=disable'
  COVER_DIR: coverage
  COVER_PKGS: ./meta/...,./dialect/...,./executor/...,./table/...,./v2/...

tasks:
  gen:mocks:
    desc: Генерация моков
    cmds:
      - go generate ./internal/contracts/mocks/
      - go generate ./internal/pkg/mocks/

  unit:all:
    desc: Все unit-тесты с покрытием (без моков)
    cmds:
      - go vet ./...
      - mkdir -p {{.COVER_DIR}}
      - go test -count=1 -coverprofile={{.COVER_DIR}}/unit_raw.out -coverpkg={{.COVER_PKGS}} ./... -tags=''
      - grep -v -e '_mock.go' -e '_mock_test.go' -e '_repo\.go' -e 'sql_gen/' {{.COVER_DIR}}/unit_raw.out > {{.COVER_DIR}}/unit.out
      - go tool cover -func={{.COVER_DIR}}/unit.out | grep -v -e '_mock' -e '_repo\.go' -e 'sql_gen/' | tee {{.COVER_DIR}}/unit.txt

  unit:
    desc: Все unit-тесты
    deps:
      - unit:all

  smoke:
    desc: "Smoke-тесты с покрытием (build tag: smoke)"
    cmds:
      - go vet ./...
      - mkdir -p {{.COVER_DIR}}
      - go test -count=1 -tags=smoke -coverprofile={{.COVER_DIR}}/smoke_raw.out -coverpkg={{.COVER_PKGS}} ./test/smoke/...
      - grep -v -e '_mock.go' -e '_mock_test.go' {{.COVER_DIR}}/smoke_raw.out > {{.COVER_DIR}}/smoke.out
      - go tool cover -func={{.COVER_DIR}}/smoke.out | grep -v -e '_mock'

  v2:smoke:
    desc: "V2 smoke-тесты с покрытием (build tag: smoke)"
    cmds:
      - go vet ./v2/...
      - mkdir -p {{.COVER_DIR}}
      - go test -count=1 -tags=smoke -run 'V2Smoke' -coverprofile={{.COVER_DIR}}/v2_smoke_raw.out -coverpkg={{.COVER_PKGS}} ./test/smoke/...
      - grep -v -e '_mock.go' -e '_mock_test.go' {{.COVER_DIR}}/v2_smoke_raw.out > {{.COVER_DIR}}/v2_smoke.out
      - go tool cover -func={{.COVER_DIR}}/v2_smoke.out | grep -v -e '_mock'

  v2:functional:
    desc: "V2 functional-тесты с покрытием (build tag: functional)"
    deps:
      - db:create
    cmds:
      - defer: { task: db:drop }
      - go vet ./v2/...
      - mkdir -p {{.COVER_DIR}}
      - TEST_PG_DSN={{.TEST_PG_DSN}} go test -count=1 -tags=functional -run 'V2Functional' -coverprofile={{.COVER_DIR}}/v2_functional_raw.out -coverpkg={{.COVER_PKGS}} ./test/functional/...
      - grep -v -e '_mock.go' -e '_mock_test.go' {{.COVER_DIR}}/v2_functional_raw.out > {{.COVER_DIR}}/v2_functional.out
      - go tool cover -func={{.COVER_DIR}}/v2_functional.out | grep -v -e '_mock'

  functional:
    desc: "Functional-тесты с покрытием (build tag: functional)"
    deps:
      - db:create
    cmds:
      - defer: { task: db:drop }
      - go vet ./...
      - mkdir -p {{.COVER_DIR}}
      - TEST_PG_DSN={{.TEST_PG_DSN}} go test -count=1 -tags=functional -coverprofile={{.COVER_DIR}}/functional_raw.out -coverpkg={{.COVER_PKGS}} ./test/functional/...
      - grep -v -e '_mock.go' -e '_mock_test.go' {{.COVER_DIR}}/functional_raw.out > {{.COVER_DIR}}/functional.out
      - go tool cover -func={{.COVER_DIR}}/functional.out | grep -v -e '_mock'

  all:
    desc: Все тесты (unit + smoke + functional)
    deps:
      - unit
      - smoke
      - functional
    cmds:
      - echo "===== Все тесты завершены ====="

  db:create:
    desc: Создание тестовой БД
    cmds:
      - psql "{{.TEST_ROOT_DSN}}" -c "DROP DATABASE IF EXISTS \"{{.TEST_PG_DB}}\";"
      - psql "{{.TEST_ROOT_DSN}}" -c "CREATE DATABASE \"{{.TEST_PG_DB}}\";"

  db:drop:
    desc: Удаление тестовой БД
    cmds:
      - psql "{{.TEST_ROOT_DSN}}" -c "DROP DATABASE IF EXISTS \"{{.TEST_PG_DB}}\";"


  full-ci:
    desc: Полный CI-прогон
    deps:
      - unit
      - smoke
      - functional

    cmds:
      - echo "===== Покрытие unit ====="
      - go tool cover -func={{.COVER_DIR}}/unit.out | grep -v -e '_mock' -e '_repo\.go' -e 'sql_gen/'

  coverage:
    desc: Показать сохранённое покрытие (unit + smoke, без моков)
    cmds:
      - sh -c 'go tool cover -func="{{.COVER_DIR}}/unit.out" | grep -v -e _mock -e _repo\\.go -e sql_gen/' || true
      - echo ""
      - sh -c 'go tool cover -func="{{.COVER_DIR}}/smoke.out" | grep -v -e _mock -e _repo\\.go -e sql_gen/' || true

  cover:html:
    desc: HTML-отчёт по unit-покрытию (без моков)
    cmds:
      - sh -c 'go tool cover -html="{{.COVER_DIR}}/unit.out" -o "{{.COVER_DIR}}/unit.html"'
      - echo "Saved to {{.COVER_DIR}}/unit.html"

  clean:coverage:
    desc: Удалить файлы покрытия
    cmds:
      - rm -rf {{.COVER_DIR}}
